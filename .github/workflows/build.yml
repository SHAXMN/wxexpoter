name: Build WechatExporter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install dependencies
      run: |
        brew install jsoncpp protobuf libplist

        # 获取 jsoncpp 安装路径
        JSONCPP_PREFIX=$(brew --prefix jsoncpp)
        echo "JSONCPP_PREFIX=$JSONCPP_PREFIX"

        # 创建符号链接到标准位置
        sudo ln -sf $JSONCPP_PREFIX/include/json /usr/local/include/json || true

    - name: Build
      run: |
        xcodebuild clean build \
          -project WechatExporter.xcodeproj \
          -scheme WechatExporter \
          -configuration Release \
          -derivedDataPath ./build \
          HEADER_SEARCH_PATHS="$(brew --prefix jsoncpp)/include $(brew --prefix protobuf)/include $(brew --prefix libplist)/include /usr/local/include"

    - name: Package app
      run: |
        cd build/Build/Products/Release
        zip -r WechatExporter.zip WechatExporter.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WechatExporter-Enhanced
        path: build/Build/Products/Release/WechatExporter.zip
        retention-days: 30
