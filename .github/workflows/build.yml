name: Build WechatExporter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache Homebrew packages
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /opt/homebrew/Cellar
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-

    - name: Install dependencies
      run: |
        # 安装所有依赖（包括 protobuf 的依赖 abseil 和 libimobiledevice）
        brew install jsoncpp protobuf abseil libplist opencore-amr lame libimobiledevice

        # 克隆并编译 silk 库
        cd /tmp
        git clone https://github.com/collects/silk.git
        cd silk

        # 修复 Makefile 以兼容 clang (移除 -enable-threads 参数)
        sed -i '' 's/-enable-threads//g' Makefile

        # 编译 silk 库 (忽略警告)
        make lib 2>&1 | grep -v "warning:" || true

        # 创建目标目录并安装 silk 库
        sudo mkdir -p /usr/local/include/silk
        sudo mkdir -p /usr/local/lib

        # 安装所有必需的头文件 (interface/ 和 src/)
        sudo cp interface/*.h /usr/local/include/silk/
        sudo cp src/*.h /usr/local/include/silk/
        sudo cp libSKP_SILK_SDK.a /usr/local/lib/

        # 验证安装
        echo "=== Installed silk headers ==="
        ls -la /usr/local/include/silk/ | head -20
        echo "=== Installed silk library ==="
        ls -la /usr/local/lib/libSKP_SILK_SDK.a

    - name: Diagnose dependencies
      run: |
        echo "=== Homebrew library versions ==="
        brew list --versions libplist libimobiledevice jsoncpp protobuf abseil opencore-amr lame

        echo ""
        echo "=== Check dylib architectures ==="
        if [ -d "releases/windows-libs/x64/rel/bin" ]; then
          file releases/windows-libs/x64/rel/bin/*.dylib 2>/dev/null || echo "No dylib files found in releases/"
          lipo -info releases/windows-libs/x64/rel/bin/*.dylib 2>/dev/null || echo "No dylib files to check"
        else
          echo "releases/windows-libs/x64/rel/bin directory does not exist yet"
        fi

        echo ""
        echo "=== Xcode and SDK info ==="
        xcodebuild -version
        xcrun --show-sdk-path
        xcrun --show-sdk-version

        echo ""
        echo "=== Architecture info ==="
        uname -m
        arch

    - name: Build
      run: |
        # 获取所有依赖的路径
        JSONCPP_PREFIX=$(brew --prefix jsoncpp)
        PROTOBUF_PREFIX=$(brew --prefix protobuf)
        ABSEIL_PREFIX=$(brew --prefix abseil)
        LIBPLIST_PREFIX=$(brew --prefix libplist)
        OPENCORE_AMR_PREFIX=$(brew --prefix opencore-amr)
        LAME_PREFIX=$(brew --prefix lame)
        LIBIMOBILEDEVICE_PREFIX=$(brew --prefix libimobiledevice)

        # 创建项目期望的 lame 库目录结构
        mkdir -p releases/windows-libs/x64/rel/bin
        cp $LAME_PREFIX/lib/libmp3lame.dylib releases/windows-libs/x64/rel/bin/libmp3lame.0.dylib

        # 构建头文件搜索路径
        HEADER_PATHS="$JSONCPP_PREFIX/include $PROTOBUF_PREFIX/include $ABSEIL_PREFIX/include $LIBPLIST_PREFIX/include $OPENCORE_AMR_PREFIX/include $LAME_PREFIX/include $LIBIMOBILEDEVICE_PREFIX/include /usr/local/include"

        # 构建库文件搜索路径
        LIBRARY_PATHS="$JSONCPP_PREFIX/lib $PROTOBUF_PREFIX/lib $ABSEIL_PREFIX/lib $LIBPLIST_PREFIX/lib $OPENCORE_AMR_PREFIX/lib $LAME_PREFIX/lib $LIBIMOBILEDEVICE_PREFIX/lib /usr/local/lib"

        echo "Header paths: $HEADER_PATHS"
        echo "Library paths: $LIBRARY_PATHS"

        echo ""
        echo "=== Xcode build settings ==="
        xcodebuild -showBuildSettings -project WechatExporter.xcodeproj -scheme WechatExporter -configuration Release | grep -E "HEADER_SEARCH_PATHS|LIBRARY_SEARCH_PATHS|ARCHS|MACOSX_DEPLOYMENT_TARGET"

        # 编译
        xcodebuild clean build \
          -project WechatExporter.xcodeproj \
          -scheme WechatExporter \
          -configuration Release \
          -derivedDataPath ./build \
          ARCHS=arm64 \
          ONLY_ACTIVE_ARCH=YES \
          HEADER_SEARCH_PATHS="$HEADER_PATHS" \
          LIBRARY_SEARCH_PATHS="$LIBRARY_PATHS"

    - name: Verify linked libraries
      run: |
        echo "=== Linked libraries ==="
        otool -L build/Build/Products/Release/WechatExporter.app/Contents/MacOS/WechatExporter

    - name: Package app
      run: |
        cd build/Build/Products/Release
        zip -r WechatExporter.zip WechatExporter.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WechatExporter-Enhanced
        path: build/Build/Products/Release/WechatExporter.zip
        retention-days: 30
