name: Build WechatExporter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install dependencies
      run: |
        # 安装所有依赖（包括 protobuf 的依赖 abseil）
        brew install jsoncpp protobuf abseil libplist opencore-amr lame

        # 克隆并编译 silk 库
        cd /tmp
        git clone https://github.com/collects/silk.git
        cd silk

        # 修复 Makefile 以兼容 clang (移除 -enable-threads 参数)
        sed -i '' 's/-enable-threads//g' Makefile

        # 编译 silk 库
        make lib

        # 安装 silk 库到系统路径
        sudo mkdir -p /usr/local/include/silk
        sudo cp interface/*.h /usr/local/include/silk/
        sudo cp libSKP_SILK_SDK.a /usr/local/lib/

    - name: Build
      run: |
        # 获取所有依赖的路径
        JSONCPP_PREFIX=$(brew --prefix jsoncpp)
        PROTOBUF_PREFIX=$(brew --prefix protobuf)
        ABSEIL_PREFIX=$(brew --prefix abseil)
        LIBPLIST_PREFIX=$(brew --prefix libplist)
        OPENCORE_AMR_PREFIX=$(brew --prefix opencore-amr)
        LAME_PREFIX=$(brew --prefix lame)

        # 构建头文件搜索路径
        HEADER_PATHS="$JSONCPP_PREFIX/include $PROTOBUF_PREFIX/include $ABSEIL_PREFIX/include $LIBPLIST_PREFIX/include $OPENCORE_AMR_PREFIX/include $LAME_PREFIX/include /usr/local/include"

        # 构建库文件搜索路径
        LIBRARY_PATHS="$JSONCPP_PREFIX/lib $PROTOBUF_PREFIX/lib $ABSEIL_PREFIX/lib $LIBPLIST_PREFIX/lib $OPENCORE_AMR_PREFIX/lib $LAME_PREFIX/lib /usr/local/lib"

        echo "Header paths: $HEADER_PATHS"
        echo "Library paths: $LIBRARY_PATHS"

        # 编译
        xcodebuild clean build \
          -project WechatExporter.xcodeproj \
          -scheme WechatExporter \
          -configuration Release \
          -derivedDataPath ./build \
          HEADER_SEARCH_PATHS="$HEADER_PATHS" \
          LIBRARY_SEARCH_PATHS="$LIBRARY_PATHS"

    - name: Package app
      run: |
        cd build/Build/Products/Release
        zip -r WechatExporter.zip WechatExporter.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WechatExporter-Enhanced
        path: build/Build/Products/Release/WechatExporter.zip
        retention-days: 30
