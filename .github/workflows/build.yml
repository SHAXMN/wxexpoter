name: Build WechatExporter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache Homebrew packages
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /opt/homebrew/Cellar
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-

    - name: Install dependencies
      run: |
        # 安装所有依赖（包括 libimobiledevice-glue 和 openssl@3）
        brew install jsoncpp protobuf abseil libplist opencore-amr lame libimobiledevice libimobiledevice-glue libusbmuxd openssl@3

        # 强制重新链接所有包（修复 GitHub Actions 上的库文件问题）
        echo "=== Force relinking all packages ==="
        brew unlink jsoncpp protobuf abseil libplist opencore-amr lame libimobiledevice libimobiledevice-glue libusbmuxd openssl@3 || true
        brew link --force --overwrite jsoncpp protobuf abseil libplist opencore-amr lame libimobiledevice libimobiledevice-glue libusbmuxd openssl@3

        # 验证库文件存在
        echo "=== Verifying library files after linking ==="
        ls -la $(brew --prefix lame)/lib/ | grep libmp3lame || echo "WARNING: lame libraries still missing!"
        ls -la $(brew --prefix libimobiledevice)/lib/ | grep libimobiledevice || echo "WARNING: libimobiledevice libraries still missing!"
        ls -la $(brew --prefix libplist)/lib/ | grep libplist || echo "WARNING: libplist libraries still missing!"

        # 克隆并编译 silk 库
        cd /tmp
        git clone https://github.com/collects/silk.git
        cd silk

        # 修复 Makefile 以兼容 clang (移除 -enable-threads 参数)
        sed -i '' 's/-enable-threads//g' Makefile

        # 编译 silk 库 (忽略警告)
        make lib 2>&1 | grep -v "warning:" || true

        # 创建目标目录并安装 silk 库
        sudo mkdir -p /usr/local/include/silk
        sudo mkdir -p /usr/local/lib

        # 安装所有必需的头文件 (interface/ 和 src/)
        sudo cp interface/*.h /usr/local/include/silk/
        sudo cp src/*.h /usr/local/include/silk/
        sudo cp libSKP_SILK_SDK.a /usr/local/lib/

        # 验证安装
        echo "=== Installed silk headers ==="
        ls -la /usr/local/include/silk/ | head -20
        echo "=== Installed silk library ==="
        ls -la /usr/local/lib/libSKP_SILK_SDK.a

    - name: Diagnose dependencies
      run: |
        echo "=== Homebrew library versions ==="
        brew list --versions libplist libimobiledevice jsoncpp protobuf abseil opencore-amr lame openssl@3

        echo ""
        echo "=== OpenSSL 3 location ==="
        OPENSSL_PREFIX=$(brew --prefix openssl@3)
        echo "OPENSSL_PREFIX: $OPENSSL_PREFIX"
        ls -la $OPENSSL_PREFIX/lib/libcrypto* $OPENSSL_PREFIX/lib/libssl* 2>/dev/null || echo "OpenSSL libraries not found!"

        echo ""
        echo "=== Xcode and SDK info ==="
        xcodebuild -version
        xcrun --show-sdk-path
        xcrun --show-sdk-version

        echo ""
        echo "=== Architecture info ==="
        uname -m
        arch

    - name: Build
      run: |
        # 获取所有依赖的路径
        JSONCPP_PREFIX=$(brew --prefix jsoncpp)
        PROTOBUF_PREFIX=$(brew --prefix protobuf)
        ABSEIL_PREFIX=$(brew --prefix abseil)
        LIBPLIST_PREFIX=$(brew --prefix libplist)
        OPENCORE_AMR_PREFIX=$(brew --prefix opencore-amr)
        LAME_PREFIX=$(brew --prefix lame)
        LIBIMOBILEDEVICE_PREFIX=$(brew --prefix libimobiledevice)
        LIBIMOBILEDEVICE_GLUE_PREFIX=$(brew --prefix libimobiledevice-glue)
        LIBUSBMUXD_PREFIX=$(brew --prefix libusbmuxd)
        OPENSSL_PREFIX=$(brew --prefix openssl@3)

        # 创建项目期望的库目录结构
        mkdir -p releases/windows-libs/x64/rel/bin
        rm -f releases/windows-libs/x64/rel/bin/*.dylib

        # 直接从 Homebrew Cellar 查找并复制库文件
        echo "=== Finding and copying library files from Homebrew Cellar ==="
        HOMEBREW_CELLAR="/opt/homebrew/Cellar"

        # 查找并复制 lame
        echo "Searching for libmp3lame..."
        LAME_LIB=$(find $HOMEBREW_CELLAR/lame -name "libmp3lame.*.dylib" -type f 2>/dev/null | head -1)
        if [ -n "$LAME_LIB" ]; then
          echo "Found: $LAME_LIB"
          cp -L "$LAME_LIB" releases/windows-libs/x64/rel/bin/libmp3lame.0.dylib
        else
          echo "ERROR: libmp3lame not found in Cellar!"
          exit 1
        fi

        # 查找并复制 libimobiledevice
        echo "Searching for libimobiledevice..."
        LIBIMOBILEDEVICE_LIB=$(find $HOMEBREW_CELLAR/libimobiledevice -name "libimobiledevice-1.0.*.dylib" -o -name "libimobiledevice.*.dylib" -type f 2>/dev/null | head -1)
        if [ -n "$LIBIMOBILEDEVICE_LIB" ]; then
          echo "Found: $LIBIMOBILEDEVICE_LIB"
          cp -L "$LIBIMOBILEDEVICE_LIB" releases/windows-libs/x64/rel/bin/libimobiledevice-1.0.6.dylib
        else
          echo "ERROR: libimobiledevice not found in Cellar!"
          exit 1
        fi

        # 查找并复制 libplist
        echo "Searching for libplist..."
        LIBPLIST_LIB=$(find $HOMEBREW_CELLAR/libplist -name "libplist-2.0.*.dylib" -o -name "libplist.*.dylib" -type f 2>/dev/null | head -1)
        if [ -n "$LIBPLIST_LIB" ]; then
          echo "Found: $LIBPLIST_LIB"
          cp -L "$LIBPLIST_LIB" releases/windows-libs/x64/rel/bin/libplist-2.0.3.dylib
        else
          echo "ERROR: libplist not found in Cellar!"
          exit 1
        fi

        # 查找并复制 libusbmuxd
        echo "Searching for libusbmuxd..."
        LIBUSBMUXD_LIB=$(find $HOMEBREW_CELLAR/libusbmuxd -name "libusbmuxd-2.0.*.dylib" -o -name "libusbmuxd.*.dylib" -type f 2>/dev/null | head -1)
        if [ -n "$LIBUSBMUXD_LIB" ]; then
          echo "Found: $LIBUSBMUXD_LIB"
          cp -L "$LIBUSBMUXD_LIB" releases/windows-libs/x64/rel/bin/libusbmuxd-2.0.6.dylib
        else
          echo "ERROR: libusbmuxd not found in Cellar!"
          exit 1
        fi

        # 查找并复制 libimobiledevice-glue
        echo "Searching for libimobiledevice-glue..."
        LIBIMOBILEDEVICE_GLUE_LIB=$(find $HOMEBREW_CELLAR/libimobiledevice-glue -name "libimobiledevice-glue-1.0.*.dylib" -o -name "libimobiledevice-glue.*.dylib" -type f 2>/dev/null | head -1)
        if [ -n "$LIBIMOBILEDEVICE_GLUE_LIB" ]; then
          echo "Found: $LIBIMOBILEDEVICE_GLUE_LIB"
          cp -L "$LIBIMOBILEDEVICE_GLUE_LIB" releases/windows-libs/x64/rel/bin/libimobiledevice-glue-1.0.0.dylib
        else
          echo "ERROR: libimobiledevice-glue not found in Cellar!"
          exit 1
        fi

        # 验证复制的库文件
        echo ""
        echo "=== Created library files ==="
        ls -lh releases/windows-libs/x64/rel/bin/

        echo ""
        echo "=== Library architectures ==="
        file releases/windows-libs/x64/rel/bin/*.dylib

        # 构建所有路径字符串（包含我们复制库文件的目录）
        COPIED_LIBS_DIR="$(pwd)/releases/windows-libs/x64/rel/bin"
        HEADER_PATHS="$JSONCPP_PREFIX/include $PROTOBUF_PREFIX/include $ABSEIL_PREFIX/include $LIBPLIST_PREFIX/include $OPENCORE_AMR_PREFIX/include $LAME_PREFIX/include $LIBIMOBILEDEVICE_PREFIX/include $LIBIMOBILEDEVICE_GLUE_PREFIX/include $OPENSSL_PREFIX/include /usr/local/include"
        LIBRARY_PATHS="$COPIED_LIBS_DIR $JSONCPP_PREFIX/lib $PROTOBUF_PREFIX/lib $ABSEIL_PREFIX/lib $LIBPLIST_PREFIX/lib $OPENCORE_AMR_PREFIX/lib $LAME_PREFIX/lib $LIBIMOBILEDEVICE_PREFIX/lib $LIBIMOBILEDEVICE_GLUE_PREFIX/lib $LIBUSBMUXD_PREFIX/lib $OPENSSL_PREFIX/lib /usr/local/lib"

        echo ""
        echo "=== Build configuration ==="
        echo "Header paths: $HEADER_PATHS"
        echo "Library paths: $LIBRARY_PATHS"
        echo ""

        # 编译 arm64 架构
        xcodebuild clean build \
          -project WechatExporter.xcodeproj \
          -scheme WechatExporter \
          -configuration Release \
          -derivedDataPath ./build \
          ARCHS=arm64 \
          ONLY_ACTIVE_ARCH=YES \
          "HEADER_SEARCH_PATHS=$HEADER_PATHS" \
          "LIBRARY_SEARCH_PATHS=$LIBRARY_PATHS" \
          "OTHER_LDFLAGS=\$(inherited) -L$OPENSSL_PREFIX/lib -L$PROTOBUF_PREFIX/lib -L$ABSEIL_PREFIX/lib -L$JSONCPP_PREFIX/lib"


    - name: Verify linked libraries
      run: |
        echo "=== Linked libraries ==="
        otool -L build/Build/Products/Release/WechatExporter.app/Contents/MacOS/WechatExporter

    - name: Package app
      run: |
        cd build/Build/Products/Release
        zip -r WechatExporter.zip WechatExporter.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WechatExporter-Enhanced
        path: build/Build/Products/Release/WechatExporter.zip
        retention-days: 30
